<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8"><title>Команден център | DealRocket 🚀</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff88; --bg: #05070a; }
        body { background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; min-height: 100vh; background-image: radial-gradient(circle at 0% 0%, #111827 0%, #05070a 100%); }
        .neon-text { color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .input-dark { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 10px; width: 100%; color: white; }
        .nav-btn { padding: 10px 20px; border-radius: 10px; transition: 0.3s; font-size: 0.8rem; text-transform: uppercase; }
        .nav-btn:hover, .nav-btn.active { background: var(--neon); color: black; font-weight: bold; }
        .hidden { display: none; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-cell { aspect-ratio: 1; border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; font-size: 0.7rem; }
        .has-note { border-color: var(--neon); color: var(--neon); font-weight: bold; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
        <h2 class="font-black italic text-xl tracking-tighter">DEAL<span class="neon-text">ROCKET</span> 🚀</h2>
        <nav class="glass p-2 flex gap-2">
            <button onclick="showSec('tools')" class="nav-btn active" id="b-tools">Мисии</button>
            <button onclick="showSec('settings')" class="nav-btn" id="b-settings">Настройки</button>
            <button onclick="showSec('calendar')" class="nav-btn" id="b-calendar">Дневник</button>
            <button id="adminBtn" onclick="location.href='admin.html'" class="nav-btn border border-purple-500 text-purple-500 hidden text-[10px]">Mothership</button>
        </nav>
        <div class="text-right">
            <p id="topName" class="font-bold"></p>
            <button onclick="localStorage.clear(); location.href='index.html'" class="text-[10px] text-red-500 uppercase">Изход</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        
        <!-- TOOLS -->
        <section id="s-tools" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div onclick="location.href='generator.html'" class="glass p-10 cursor-pointer hover:border-green-400 transition">
                <div class="text-4xl mb-4">🛰️</div>
                <h3 class="font-bold uppercase mb-2">Генератор</h3>
                <p class="text-xs text-gray-500">Създай нова оферта.</p>
            </div>
            <div onclick="location.href='protocols.html'" class="glass p-10 cursor-pointer hover:border-blue-400 transition">
                <div class="text-4xl mb-4 text-blue-400">🛡️</div>
                <h3 class="font-bold uppercase mb-2">Protocols</h3>
                <p class="text-xs text-gray-500">Гаранции и Приемане.</p>
            </div>
            <div onclick="location.href='marketing.html'" class="glass p-10 cursor-pointer hover:border-purple-400 transition">
                <div class="text-4xl mb-4 text-purple-400">📸</div>
                <h3 class="font-bold uppercase mb-2">Signal Boost</h3>
                <p class="text-xs text-gray-500">QR карти за ревюта.</p>
            </div>
        </section>

        <!-- SETTINGS -->
        <section id="s-settings" class="hidden glass p-10 max-w-2xl mx-auto">
            <h3 class="neon-text font-bold mb-6 uppercase tracking-widest text-sm">Настройки на профила</h3>
            <div class="space-y-4 text-left">
                <div><label class="text-[10px] text-gray-500 font-bold uppercase">Име / Фирма</label><input type="text" id="set-name" class="input-dark"></div>
                <div><label class="text-[10px] text-gray-500 font-bold uppercase">ЕИК</label><input type="text" id="set-reg" class="input-dark"></div>
                <div><label class="text-[10px] text-gray-500 font-bold uppercase">Телефон</label><input type="text" id="set-phone" class="input-dark"></div>
                <div><label class="text-[10px] text-gray-500 font-bold uppercase">IBAN</label><input type="text" id="set-iban" class="input-dark"></div>
                <div><label class="text-[10px] text-gray-500 font-bold uppercase">Лого URL</label><input type="text" id="set-logo" class="input-dark" placeholder="https://..."></div>
                <button onclick="saveSettings()" id="saveBtn" class="w-full bg-green-500 text-black font-black py-4 rounded-xl mt-4 uppercase">Запази промените 💾</button>
            </div>
        </section>

        <!-- CALENDAR -->
        <section id="s-calendar" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div class="glass p-8"><div class="calendar-grid" id="calGrid"></div></div>
                <div class="glass p-8 text-left">
                    <h4 class="text-xs font-bold text-gray-500 uppercase mb-4">Бележки за месеца</h4>
                    <div id="notesList" class="space-y-2"></div>
                </div>
            </div>
        </section>

    </main>

    <!-- NOTE MODAL -->
    <div id="noteModal" class="fixed inset-0 bg-black/90 flex items-center justify-center hidden p-4 z-50">
        <div class="glass p-8 w-full max-w-sm">
            <h3 id="noteDate" class="neon-text font-bold mb-4">Дата</h3>
            <textarea id="noteText" class="input-dark h-32" placeholder="Текст на бележката..."></textarea>
            <div class="flex gap-2 mt-4">
                <button onclick="sendNote()" class="flex-grow bg-green-500 text-black font-bold py-2 rounded-lg uppercase text-xs">Запази</button>
                <button onclick="document.getElementById('noteModal').classList.add('hidden')" class="px-4 py-2 border border-white/10 rounded-lg text-xs uppercase">Отказ</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzhckte9EXQX9OA5CLg5DkIGQVudFjlj8PypwLKvd880fPEn-Zr-bPWlUAvdCazRd1m8A/exec";
        let u = JSON.parse(localStorage.getItem('dr_user'));
        if(!u) location.href='index.html';

        document.getElementById('topName').innerText = u.name;
        if(u.email === "твоят@имейл.com") document.getElementById('adminBtn').classList.remove('hidden');

        function showSec(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('s-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('b-' + id).classList.add('active');
            if(id === 'calendar') renderCal();
            if(id === 'settings') {
                document.getElementById('set-name').value = u.name || "";
                document.getElementById('set-reg').value = u.reg || "";
                document.getElementById('set-phone').value = u.phone || "";
                document.getElementById('set-iban').value = u.iban || "";
                document.getElementById('set-logo').value = u.logo || "";
            }
        }

        async function saveSettings() {
            const btn = document.getElementById('saveBtn');
            btn.innerText = "ЗАПИСВАНЕ...";
            const data = {
                action: "updateProfile", email: u.email,
                name: document.getElementById('set-name').value,
                reg: document.getElementById('set-reg').value,
                phone: document.getElementById('set-phone').value,
                iban: document.getElementById('set-iban').value,
                logo: document.getElementById('set-logo').value
            };
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data)});
            u = {...u, ...data};
            localStorage.setItem('dr_user', JSON.stringify(u));
            btn.innerText = "ЗАПАЗЕНО! ✅";
            setTimeout(() => btn.innerText = "ЗАПАЗИ ПРОМЕНИТЕ 💾", 2000);
        }

        let selDate = "";
        function renderCal() {
            const grid = document.getElementById('calGrid');
            const list = document.getElementById('notesList');
            grid.innerHTML = ""; list.innerHTML = "";
            let notes = JSON.parse(u.notes || "{}");
            for(let i=1; i<=31; i++) {
                let d = i + "-03-2026";
                let cell = document.createElement('div');
                cell.className = "day-cell" + (notes[d] ? " has-note" : "");
                cell.innerText = i;
                cell.onclick = () => { selDate = d; document.getElementById('noteDate').innerText = d; document.getElementById('noteText').value = notes[d] || ""; document.getElementById('noteModal').classList.remove('hidden'); };
                grid.appendChild(cell);
                if(notes[d]) list.innerHTML += `<div class="p-2 bg-white/5 border-l-2 border-green-400 text-[10px] uppercase"><b>${d}:</b> ${notes[d]}</div>`;
            }
        }

        async function sendNote() {
            const note = document.getElementById('noteText').value;
            let notes = JSON.parse(u.notes || "{}");
            notes[selDate] = note;
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "saveNote", email: u.email, date: selDate, note: note })});
            u.notes = JSON.stringify(notes);
            localStorage.setItem('dr_user', JSON.stringify(u));
            renderCal();
            document.getElementById('noteModal').classList.add('hidden');
        }
    </script>
</body>
</html>

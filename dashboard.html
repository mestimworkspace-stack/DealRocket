<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8"><title>Dashboard | DealRocket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #05070a; color: white; font-family: 'Montserrat', sans-serif; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .neon { color: #00ff88; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between mb-10">
            <h2 class="font-black italic">DEALROCKET 🚀</h2>
            <div class="flex gap-4 items-center">
                <button onclick="toggleProfile()" class="text-xs border border-white/20 p-2 rounded">Профил</button>
                <button onclick="localStorage.clear(); location.href='index.html'" class="text-xs text-red-400">Изход</button>
            </div>
        </header>

        <!-- PROFILE MODAL -->
        <div id="profileBox" class="glass p-8 mb-10 hidden">
            <h3 class="neon font-bold mb-4">Настройки на профила</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="editName" placeholder="Име / Фирма" class="bg-black p-2 border border-white/10 rounded">
                <input type="text" id="editReg" placeholder="ЕИК" class="bg-black p-2 border border-white/10 rounded">
                <input type="text" id="editPhone" placeholder="Телефон" class="bg-black p-2 border border-white/10 rounded">
                <input type="text" id="editIban" placeholder="IBAN" class="bg-black p-2 border border-white/10 rounded">
                <input type="text" id="editLogo" placeholder="Линк към Лого (URL)" class="bg-black p-2 border border-white/10 rounded col-span-2">
            </div>
            <button onclick="saveProfile()" class="bg-green-500 text-black px-6 py-2 rounded mt-4 font-bold">Запази промените</button>
        </div>

        <h1 class="text-3xl font-light mb-8 italic">Добре дошъл, <span id="wName" class="neon font-bold">Пилот</span>!</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div onclick="location.href='generator.html'" class="glass p-10 cursor-pointer hover:border-green-400 transition">
                <div class="text-4xl mb-4">🛰️</div>
                <h3 class="font-bold uppercase">Генератор на Оферти</h3>
                <p class="text-gray-400 text-sm mt-2">Създай убийствена оферта.</p>
            </div>
            <div class="glass p-10 opacity-50"><h3 class="font-bold uppercase">🛡️ Asteroid Defense</h3><p class="text-xs">Скоро...</p></div>
        </div>
    </div>

    <script>
        const u = JSON.parse(localStorage.getItem('dr_user'));
        if(!u) location.href='index.html';
        document.getElementById('wName').innerText = u.name;

        function toggleProfile() {
            const box = document.getElementById('profileBox');
            box.classList.toggle('hidden');
            document.getElementById('editName').value = u.name || "";
            document.getElementById('editReg').value = u.regNumber || "";
            document.getElementById('editPhone').value = u.phone || "";
            document.getElementById('editIban').value = u.iban || "";
            document.getElementById('editLogo').value = u.logo || "";
        }

        async function saveProfile() {
            const updated = {
                action: "updateProfile",
                email: u.email,
                name: document.getElementById('editName').value,
                regNumber: document.getElementById('editReg').value,
                phone: document.getElementById('editPhone').value,
                iban: document.getElementById('editIban').value,
                logo: document.getElementById('editLogo').value
            };
            // Тук сложи твоя Apps Script URL
            const res = await fetch("ТУК_ТВОЯ_URL", { method: 'POST', body: JSON.stringify(updated)});
            localStorage.setItem('dr_user', JSON.stringify(updated));
            alert("Профилът е обновен!");
            location.reload();
        }
    </script>
</body>
</html>

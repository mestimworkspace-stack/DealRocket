<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8"><title>Генератор | DealRocket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #05070a; color: white; font-family: 'Montserrat', sans-serif; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .fuel-bar { height: 10px; background: #111; border-radius: 5px; overflow: hidden; }
        .fuel-fill { height: 100%; width: 0%; transition: 0.5s; }
        #pdf-area { background: white; color: #111; width: 794px; min-height: 1123px; padding: 60px; margin: auto; transform: scale(0.6); transform-origin: top center; }
        .theme-cosmos { border-top: 15px solid #00ff88; }
        .theme-architect { border: 2px solid #2563eb; background-image: radial-gradient(#eee 1px, transparent 1px); background-size: 20px 20px; }
        .theme-classic { border: 1px solid #92400e; font-family: serif; }
    </style>
</head>
<body class="p-4 flex flex-col lg:flex-row gap-8">
    
    <!-- КОНТРОЛИ -->
    <div class="lg:w-1/3 space-y-4 overflow-y-auto max-h-screen pb-20">
        <div class="glass p-6 space-y-3">
            <h2 class="text-green-400 font-bold uppercase text-xs">Детайли на документа</h2>
            <select id="docTitle" onchange="update()" class="w-full bg-black p-2 rounded border border-white/10 text-sm">
                <option value="ОФЕРТА">ОФЕРТА</option>
                <option value="ПРЕДЛОЖЕНИЕ">ПРЕДЛОЖЕНИЕ</option>
                <option value="ЦЕНОРАЗПИС">ЦЕНОРАЗПИС</option>
                <option value="ПРОТОКОЛ">ПРОТОКОЛ</option>
            </select>
            <input type="text" id="clientName" placeholder="Име на клиент" oninput="update()" class="w-full bg-black p-2 rounded border border-white/10 text-sm">
            <input type="text" id="clientAddr" placeholder="Адрес на обект" oninput="update()" class="w-full bg-black p-2 rounded border border-white/10 text-sm">
        </div>

        <div class="glass p-6 space-y-3">
            <h2 class="text-green-400 font-bold uppercase text-xs">Персонализирани полета</h2>
            <div class="grid grid-cols-3 gap-2">
                <input type="text" id="hDesc" value="Описание" oninput="update()" class="bg-black p-1 text-[10px] rounded border border-white/10">
                <input type="text" id="hQty" value="К-во" oninput="update()" class="bg-black p-1 text-[10px] rounded border border-white/10">
                <input type="text" id="hPrice" value="Сума" oninput="update()" class="bg-black p-1 text-[10px] rounded border border-white/10">
            </div>
            <select id="niche" onchange="update()" class="w-full bg-black p-2 rounded border border-white/10 text-sm">
                <option value="laminate">🏗️ Ремонти</option>
                <option value="influencer">📸 Инфлуенсър</option>
                <option value="legal">⚖️ Услуги</option>
            </select>
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="qty" placeholder="Количество" oninput="update()" class="bg-black p-2 rounded border border-white/10 text-sm">
                <input type="number" id="price" placeholder="Цена €" oninput="update()" class="bg-black p-2 rounded border border-white/10 text-sm">
            </div>
            <textarea id="terms" placeholder="Условия / Гаранция" oninput="update()" class="w-full bg-black p-2 rounded border border-white/10 text-sm h-20"></textarea>
        </div>

        <div class="glass p-6">
            <h3 class="text-purple-400 text-xs font-bold uppercase mb-2">Nebula AI Simulator</h3>
            <p id="nebulaMsg" class="text-[10px] text-gray-400 italic">Натисни за тренировка...</p>
            <button onclick="runNebula()" class="mt-2 text-[10px] border border-purple-500 p-2 rounded uppercase w-full">Тренирай →</button>
        </div>

        <div class="glass p-6">
            <div class="flex justify-between text-[10px] mb-2 font-bold uppercase"><span>DealScore™</span> <span id="scoreVal">0%</span></div>
            <div class="fuel-bar"><div id="fuel" class="fuel-fill bg-red-600"></div></div>
        </div>
        <button onclick="exportPDF()" class="w-full bg-green-500 p-4 rounded-xl text-black font-black uppercase">Изтегли PDF 🛰️</button>
    </div>

    <!-- PREVIEW -->
    <div class="lg:w-2/3">
        <div id="pdf-area" class="theme-cosmos">
            <div class="flex justify-between mb-8">
                <h1 id="outTitle" class="text-4xl font-black italic">ОФЕРТА</h1>
                <img id="outLogo" src="" class="h-16 w-auto hidden">
            </div>
            <div class="grid grid-cols-2 mb-8 text-xs gap-10">
                <div>
                    <p class="font-bold uppercase text-gray-400 border-b mb-2">Изпълнител</p>
                    <p id="pName" class="font-bold text-lg"></p>
                    <p id="pID"></p><p id="pPhone"></p><p id="pIban"></p>
                </div>
                <div>
                    <p class="font-bold uppercase text-gray-400 border-b mb-2">Клиент / Обект</p>
                    <p id="outClient" class="font-bold">Уважаеми Клиент</p>
                    <p id="outAddr" class="italic text-gray-500"></p>
                </div>
            </div>
            <table class="w-full mb-8 text-left text-sm border-collapse">
                <thead id="pHead" class="bg-gray-100 uppercase text-[10px] font-bold">
                    <tr><th id="thDesc" class="p-3">Описание</th><th id="thQty" class="p-3 text-center">К-во</th><th id="thPrice" class="p-3 text-right">Сума</th></tr>
                </thead>
                <tbody id="pRows"></tbody>
            </table>
            <div class="flex justify-end mb-8 font-black text-xl border-t-4 border-black pt-2">
                <span>ОБЩО:</span> <span id="pTotal" class="ml-4">0 €</span>
            </div>
            <div class="p-4 bg-gray-50 border-l-4 border-green-500 text-xs italic">
                <p class="font-bold uppercase mb-1">Условия:</p>
                <p id="pTerms">Няма зададени условия.</p>
            </div>
        </div>
    </div>

    <script>
        const u = JSON.parse(localStorage.getItem('dr_user'));
        const objections = [
            "Скъпо е, съседът го прави за без пари.",
            "Нямам бюджет в момента, може ли отстъпка?",
            "Защо трябва да плащам аванс?",
            "Другата фирма ми дава 5 години гаранция, вие само 2.",
            "Може ли да започнете утре?",
            "Материалите ми се виждат некачествени.",
            "Няма ли да стане по-бързо?",
            "Ще ми издадете ли фактура?",
            "Може ли да платя след 3 месеца?",
            "Как да съм сигурен, че ще почистите след себе си?",
            "Офертата ви е прекалено сложна.",
            "Има ли скрити такси?",
            "Защо цената на труда е толкова висока?",
            "Може ли да ползваме мои материали?",
            "Ако не ми хареса, връщате ли парите?"
        ];

        function update() {
            const n = document.getElementById('niche').value;
            let q = parseFloat(document.getElementById('qty').value) || 0;
            const p = document.getElementById('price').value || 0;
            if(n==='laminate') q *= 1.1;
            const total = q * p;

            document.getElementById('outTitle').innerText = document.getElementById('docTitle').value;
            document.getElementById('outClient').innerText = document.getElementById('clientName').value || "Уважаеми Клиент";
            document.getElementById('outAddr').innerText = document.getElementById('clientAddr').value;
            
            document.getElementById('thDesc').innerText = document.getElementById('hDesc').value;
            document.getElementById('thQty').innerText = document.getElementById('hQty').value;
            document.getElementById('thPrice').innerText = document.getElementById('hPrice').value;

            document.getElementById('pRows').innerHTML = `<tr><td class="p-3 border-b">Услуга/Продукт</td><td class="p-3 border-b text-center">${q.toFixed(2)}</td><td class="p-3 border-b text-right">${total.toFixed(2)} €</td></tr>`;
            document.getElementById('pTotal').innerText = total.toFixed(2) + " €";
            document.getElementById('pTerms').innerText = document.getElementById('terms').value || "Няма зададени условия.";

            let score = 0;
            if(q>0 && p>0) score += 40;
            if(document.getElementById('terms').value.length > 20) score += 60;
            document.getElementById('fuel').style.width = score + "%";
            document.getElementById('scoreVal').innerText = score + "%";
        }

        function runNebula() {
            const m = document.getElementById('nebulaMsg');
            m.innerText = "Симулирам скептичен клиент...";
            setTimeout(() => {
                const randomObj = objections[Math.floor(Math.random() * objections.length)];
                m.innerText = "AI КЛИЕНТ: '" + randomObj + "'";
            }, 1000);
        }

        function exportPDF() {
            html2pdf().from(document.getElementById('pdf-area')).save();
        }

        document.getElementById('pName').innerText = u.name;
        document.getElementById('pID').innerText = u.regNumber ? "ЕИК: " + u.regNumber : "Фрийлансър";
        document.getElementById('pPhone').innerText = u.phone || "";
        document.getElementById('pIban').innerText = u.iban || "";
        if(u.logo) { document.getElementById('outLogo').src = u.logo; document.getElementById('outLogo').classList.remove('hidden'); }
        update();
    </script>
</body>
</html>

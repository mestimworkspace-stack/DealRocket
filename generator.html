<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Pro | DealRocket 🚀</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Playfair+Display:wght@700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff88; --bg: #05070a; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        .input-dark { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; width: 100%; color: white; font-size: 0.8rem; }
        
        /* КОНТЕЙНЕР ЗА ПРЕГЛЕД */
        #pdf-preview-wrap { background: #111; padding: 40px; display: flex; justify-content: center; overflow-x: auto; }
        #pdf-area { background: white; color: #1a202c; width: 794px; min-height: 1123px; padding: 50px; position: relative; transform: scale(0.7); transform-origin: top center; box-shadow: 0 0 40px rgba(0,0,0,0.5); }

        /* --- ТЕМА 1: ZENITH (Modern High-Tech) --- */
        .theme-zenith { border-left: 12px solid #00ff88; }
        .theme-zenith h1 { font-weight: 900; letter-spacing: -2px; font-size: 45px; text-transform: uppercase; color: #000; }
        .theme-zenith th { background: #f4f4f5; color: #000; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; padding: 15px; }
        .theme-zenith .accent-line { width: 50px; height: 4px; background: #00ff88; margin-bottom: 20px; }

        /* --- ТЕМА 2: BLUEPRINT (Industrial/Technical) --- */
        .theme-blueprint { border: 1px solid #e2e8f0; }
        .theme-blueprint::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px); background-size: 30px 30px; z-index: 0; opacity: 0.5; }
        .theme-blueprint * { z-index: 1; position: relative; }
        .theme-blueprint h1 { font-family: 'JetBrains Mono', monospace; font-weight: bold; border: 2px solid #000; padding: 10px 20px; display: inline-block; }
        .theme-blueprint th { border: 1px solid #000; background: #000; color: #fff; }

        /* --- ТЕМА 3: ELEGANCE (Premium/Minimal) --- */
        .theme-elegance { font-family: 'Inter', sans-serif; padding: 80px !important; }
        .theme-elegance h1 { font-family: 'Playfair Display', serif; font-size: 38px; text-align: center; border-bottom: 1px solid #eee; padding-bottom: 30px; margin-bottom: 40px; }
        .theme-elegance th { border-bottom: 2px solid #111; background: none; color: #111; text-align: left; }
        .theme-elegance .total-box { background: #fafafa; padding: 20px; border-radius: 10px; }

        .hidden { display: none; }
    </style>
</head>
<body class="p-4 flex flex-col lg:flex-row gap-8">

    <!-- КОНТРОЛЕН ПАНЕЛ -->
    <div class="lg:w-1/3 space-y-4 max-h-screen overflow-y-auto pb-20 no-scrollbar">
        <div class="glass p-6 space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-green-400 font-bold text-xs uppercase tracking-widest">Конфигурация</h2>
                <select id="themeSelect" onchange="setTheme(this.value)" class="bg-white/5 border border-white/10 text-[10px] p-1 rounded">
                    <option value="zenith">ZENITH STYLE</option>
                    <option value="blueprint">BLUEPRINT STYLE</option>
                    <option value="elegance">ELEGANCE STYLE</option>
                </select>
            </div>
            
            <input type="text" id="clientName" placeholder="Име на клиент" oninput="update()" class="input-dark">
            <input type="text" id="clientAddr" placeholder="Адрес / Обект" oninput="update()" class="input-dark">
            
            <div id="itemsList" class="space-y-2 border-t border-white/10 pt-4">
                <!-- Редове -->
            </div>
            <button onclick="addItem()" class="w-full py-2 border border-dashed border-white/20 rounded-lg text-[10px] hover:bg-white/5">+ ДОБАВИ ПОЗИЦИЯ</button>

            <textarea id="terms" oninput="update()" placeholder="Гаранция и Условия..." class="input-dark h-20"></textarea>
            
            <div class="flex items-center justify-between text-[10px] uppercase font-bold">
                <span>Включи ДДС (20%)</span>
                <input type="checkbox" id="vatToggle" onchange="update()" class="w-4 h-4 accent-green-400">
            </div>
        </div>

        <!-- NEBULA AI -->
        <div class="glass p-6 bg-purple-500/5 border-purple-500/20">
            <h3 class="text-purple-400 text-[10px] font-black uppercase mb-2">Nebula AI: Скрипт за затваряне</h3>
            <div id="nebulaResult" class="text-[11px] text-gray-400 italic">Попълни офертата и тренирай...</div>
            <button onclick="runNebula()" class="w-full mt-3 py-2 bg-purple-500/20 border border-purple-500/40 rounded-lg text-purple-400 text-[10px] font-bold uppercase">Симулирай възражение</button>
        </div>

        <button onclick="exportPDF()" class="w-full bg-green-500 text-black font-black py-4 rounded-xl uppercase shadow-lg shadow-green-500/20">ИЗТЕГЛИ ОФЕРТА 🛰️</button>
    </div>

    <!-- ПРЕГЛЕД -->
    <div class="lg:w-2/3" id="pdf-preview-wrap">
        <div id="pdf-area" class="theme-zenith">
            <div class="flex justify-between items-start mb-12">
                <div>
                    <div class="accent-line"></div>
                    <h1 id="outTitle">ОФЕРТА</h1>
                    <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest mt-2" id="outDate"></p>
                </div>
                <img id="outLogo" src="" class="h-16 w-auto">
            </div>

            <div class="grid grid-cols-2 gap-10 mb-12 text-[11px]">
                <div>
                    <p class="text-gray-400 uppercase font-bold mb-2">Изпълнител</p>
                    <p id="pName" class="font-bold text-lg mb-1"></p>
                    <p id="pID" class="text-gray-500"></p>
                    <p id="pPhone" class="text-gray-500"></p>
                    <p id="pIBAN" class="text-gray-600 font-mono mt-2"></p>
                </div>
                <div class="text-right">
                    <p class="text-gray-400 uppercase font-bold mb-2">Получател</p>
                    <p id="outClient" class="font-bold text-lg italic"></p>
                    <p id="outAddr" class="text-gray-500"></p>
                </div>
            </div>

            <table class="w-full mb-10 text-sm">
                <thead>
                    <tr>
                        <th class="text-left">Описание</th>
                        <th class="text-center">Количество</th>
                        <th class="text-right">Общо</th>
                    </tr>
                </thead>
                <tbody id="pRows"></tbody>
            </table>

            <div class="flex justify-end mb-16">
                <div class="w-1/2 space-y-2 border-t-2 border-black pt-4">
                    <div class="flex justify-between text-xs"><span>Междинна сума:</span> <span id="outSub">0 €</span></div>
                    <div id="vatRow" class="flex justify-between text-xs text-gray-400 hidden"><span>ДДС (20%):</span> <span id="outVat">0 €</span></div>
                    <div class="flex justify-between text-2xl font-black pt-2 border-t border-gray-100">
                        <span>ОБЩО:</span> <span id="outTotal">0 €</span>
                    </div>
                </div>
            </div>

            <div class="p-8 bg-gray-50 border-l-4 border-black text-[11px]">
                <p class="font-black uppercase mb-2 tracking-widest text-gray-400">Гаранция и Условия</p>
                <p id="outTerms" class="leading-relaxed italic">Валидност: 7 дни. Гаранционен срок съгласно договора.</p>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('dr_user'));
        const logoHidden = localStorage.getItem('dr_logo_hidden') === 'true';
        let items = [{ desc: "Основна услуга", qty: 1, price: 0 }];

        const nebulaData = [
            { q: "Скъпо е, намерих по-евтино.", a: "Разбирам. Нашата цена включва премиум материали и 24м гаранция, които ви спестяват пари в дългосрочен план." },
            { q: "Може ли отстъпка за плащане в брой?", a: "Цената е оптимизирана за максимално качество. Можем да обсъдим малка отстъпка само при 100% авансово плащане." },
            { q: "Другите започват още утре.", a: "Бързата работа често е за сметка на качеството. Ние планираме прецизно, за да нямате проблеми след година." }
        ];

        function addItem() {
            items.push({ desc: "", qty: 1, price: 0 });
            renderInputs();
            update();
        }

        function renderInputs() {
            const container = document.getElementById('itemsList');
            container.innerHTML = items.map((item, idx) => `
                <div class="flex gap-2 mb-2">
                    <input type="text" value="${item.desc}" oninput="items[${idx}].desc=this.value; update()" class="input-dark flex-grow" placeholder="Услуга">
                    <input type="number" value="${item.qty}" oninput="items[${idx}].qty=this.value; update()" class="input-dark w-12 text-center">
                    <input type="number" value="${item.price}" oninput="items[${idx}].price=this.value; update()" class="input-dark w-16 text-right">
                </div>
            `).join('');
        }

        function update() {
            document.getElementById('outClient').innerText = document.getElementById('clientName').value || "УВАЖАЕМИ КЛИЕНТ";
            document.getElementById('outAddr').innerText = document.getElementById('clientAddr').value;
            document.getElementById('outTerms').innerText = document.getElementById('terms').value || "Валидност: 7 дни. Гаранционен срок съгласно договора.";

            let sub = 0;
            const rows = items.map(i => {
                const total = i.qty * i.price;
                sub += total;
                return `<tr class="border-b border-gray-50"><td class="py-4 font-bold">${i.desc}</td><td class="py-4 text-center">${i.qty}</td><td class="py-4 text-right">${total.toFixed(2)} €</td></tr>`;
            }).join('');

            const isVat = document.getElementById('vatToggle').checked;
            const vat = isVat ? sub * 0.2 : 0;
            document.getElementById('pRows').innerHTML = rows;
            document.getElementById('outSub').innerText = sub.toFixed(2) + " €";
            document.getElementById('outVat').innerText = vat.toFixed(2) + " €";
            document.getElementById('outTotal').innerText = (sub + vat).toFixed(2) + " €";
            document.getElementById('vatRow').classList.toggle('hidden', !isVat);
        }

        function setTheme(t) {
            document.getElementById('pdf-area').className = "theme-" + t;
        }

        function runNebula() {
            const res = document.getElementById('nebulaResult');
            res.innerText = "Анализирам психологията на клиента...";
            setTimeout(() => {
                const data = nebulaData[Math.floor(Math.random() * nebulaData.length)];
                res.innerHTML = `<p class="text-purple-400 font-bold">КЛИЕНТЪТ КАЗВА: "${data.q}"</p>
                                 <p class="text-white mt-2 font-bold uppercase text-[9px]">ТВОЯТ ОТГОВОР:</p>
                                 <p class="text-green-400">"${data.a}"</p>`;
            }, 800);
        }

        function exportPDF() {
            const el = document.getElementById('pdf-area');
            html2pdf().from(el).set({ margin:0, filename:'Offer.pdf', html2canvas:{scale:3} }).save();
        }

        // Init
        document.getElementById('pName').innerText = user.name;
        document.getElementById('pID').innerText = user.reg ? "ЕИК: " + user.reg : "Професионални услуги";
        document.getElementById('pPhone').innerText = user.phone || "";
        document.getElementById('pIBAN').innerText = user.iban || "";
        document.getElementById('outDate').innerText = new Date().toLocaleDateString('bg-BG');
        
        if (user.logo && !logoHidden) {
            document.getElementById('outLogo').src = user.logo;
        } else {
            document.getElementById('outLogo').classList.add('hidden');
        }

        renderInputs();
        update();
    </script>
</body>
</html>

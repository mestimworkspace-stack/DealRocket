<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DealRocket 🚀 | Step Your Game Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff88; --bg: #05070a; }
        body { background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        .space-font { font-family: 'Orbitron', sans-serif; }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; }
        .btn-neon { background: var(--neon); color: black; font-weight: 900; transition: 0.3s; box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); }
        .btn-neon:hover { transform: scale(1.05); box-shadow: 0 0 40px var(--neon); }
        .input-dark { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; width: 100%; margin-top: 8px; }
        .input-dark:focus { border-color: var(--neon); outline: none; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <!-- LANDING -->
    <div id="landing" class="text-center space-y-8 max-w-4xl">
        <h1 class="space-font text-6xl md:text-8xl italic tracking-tighter">DEAL<span class="neon-text">ROCKET</span> 🚀</h1>
        <p class="text-gray-400 tracking-[0.3em] uppercase text-xs">Step Your Game Up</p>
        <h2 class="text-2xl font-light leading-relaxed">Превърни офертите си в оръжие за продажби.</h2>
        
        <div class="flex gap-4 justify-center mt-12">
            <button onclick="openAuth('register')" class="btn-neon px-12 py-5 rounded-full uppercase italic">Старт на мисията</button>
            <button onclick="openAuth('login')" class="border border-white/20 px-12 py-5 rounded-full uppercase hover:bg-white/5 transition">Вход</button>
        </div>
    </div>

    <!-- AUTH MODAL -->
    <div id="authModal" class="fixed inset-0 bg-black/90 flex items-center justify-center hidden p-4 z-50">
        <div class="glass p-10 w-full max-w-md relative">
            <button onclick="closeAuth()" class="absolute top-6 right-6 text-gray-500">✕</button>
            <h2 id="authTitle" class="space-font text-2xl neon-text mb-8 uppercase tracking-widest">Регистрация</h2>
            <form id="authForm" class="space-y-4">
                <div id="regOnly">
                    <select id="userType" onchange="toggleBiz()" class="input-dark">
                        <option value="Freelancer">Аз съм Фрийлансър</option>
                        <option value="Company">Аз съм Фирма</option>
                    </select>
                    <input type="text" id="name" placeholder="Име / Бранд / Фирма" class="input-dark mt-4">
                    <input type="text" id="regNum" placeholder="ЕИК (само за фирми)" class="input-dark hidden">
                </div>
                <input type="email" id="email" placeholder="Твоят Имейл" class="input-dark">
                <input type="password" id="password" placeholder="Парола" class="input-dark">
                <button type="submit" id="subBtn" class="btn-neon w-full py-5 rounded-2xl uppercase mt-6 shadow-lg">ИЗСТРЕЛВАНЕ 🚀</button>
                <p id="msg" class="text-xs text-center mt-6"></p>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzhckte9EXQX9OA5CLg5DkIGQVudFjlj8PypwLKvd880fPEn-Zr-bPWlUAvdCazRd1m8A/exec";
        let mode = 'register';

        function openAuth(m) {
            mode = m;
            document.getElementById('authModal').classList.remove('hidden');
            document.getElementById('authTitle').innerText = m === 'register' ? 'Регистрация' : 'Вход';
            document.getElementById('regOnly').classList.toggle('hidden', m === 'login');
            document.getElementById('subBtn').innerText = m === 'register' ? 'Създай Профил' : 'Влез в Кокпита';
        }

        function closeAuth() { document.getElementById('authModal').classList.add('hidden'); }
        function toggleBiz() { document.getElementById('regNum').classList.toggle('hidden', document.getElementById('userType').value === 'Freelancer'); }

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg');
            msg.innerText = "Свързване с базата данни...";

            const payload = {
                action: mode,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                userType: document.getElementById('userType').value,
                name: document.getElementById('name').value,
                regNumber: document.getElementById('regNum').value
            };

            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.json();

            if (result.result === 'success') {
                if (mode === 'register') {
                    alert("Профилът е създаден! Вече можеш да влезеш.");
                    location.reload();
                } else {
                    localStorage.setItem('dr_user', JSON.stringify(result.user));
                    window.location.href = "dashboard.html";
                }
            } else {
                msg.innerText = "Грешка: " + result.message;
                msg.classList.add('text-red-500');
            }
        };
    </script>
</body>
</html>
